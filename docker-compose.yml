version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: toolmaster_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: toolmaster
      MYSQL_USER: toolmaster
      MYSQL_PASSWORD: toolmaster_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  db_data:
